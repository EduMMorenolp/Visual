<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ComfyUI - Generador de Imágenes</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <header>
      <h1>Generador de Imágenes con IA</h1>
      <p>SDXL · Juggernaut XL v8 · Aceleración GPU</p>
      <div class="status-badge" id="status-badge">
        <span class="dot" id="status-dot"></span>
        <span id="status-text">Verificando conexión...</span>
      </div>
    </header>

    <div class="main-grid">
      <div class="card">
        <h2>Prompt</h2>
        <form id="generate-form" autocomplete="off">
          <div class="form-group">
            <label for="prompt">Prompt</label>
            <textarea id="prompt" placeholder="Ej: astronaut riding a horse, cinematic lighting, highly detailed">astronaut riding a horse, cinematic lighting, highly detailed</textarea>
          </div>

          <div class="form-group">
            <label for="negative-prompt">Prompt negativo (opcional)</label>
            <textarea id="negative-prompt" placeholder="Ej: blurry, low quality, distorted"></textarea>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="model">Modelo</label>
              <select id="model">
                <option value="sdxl">SDXL (Juggernaut)</option>
                <option value="flux">FLUX.1 NF4</option>
              </select>
            </div>
            <div class="form-group">
              <label for="seed">Seed (-1 = aleatorio)</label>
              <input type="number" id="seed" value="-1" min="-1" max="999999999">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="steps">Steps</label>
              <input type="number" id="steps" value="30" min="1" max="150">
            </div>
            <div class="form-group">
              <label for="cfg">CFG Scale</label>
              <input type="number" id="cfg" value="7.0" min="1" max="30" step="0.5">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="width">Ancho</label>
              <select id="width">
                <option value="512">512</option>
                <option value="768">768</option>
                <option value="1024" selected>1024</option>
                <option value="1280">1280</option>
              </select>
            </div>
            <div class="form-group">
              <label for="height">Alto</label>
              <select id="height">
                <option value="512">512</option>
                <option value="768">768</option>
                <option value="1024" selected>1024</option>
                <option value="1280">1280</option>
              </select>
            </div>
          </div>

          <button type="submit" class="btn btn-primary" id="generate-btn">
            <span class="btn-text">Generar imagen</span>
            <span class="spinner"></span>
          </button>
        </form>
        <div class="progress-bar" id="progress-bar">
          <div class="progress-bar-fill"></div>
        </div>
      </div>

      <div class="card">
        <h2>Resultado</h2>
        <div class="result-area" id="result-area">
          <div class="placeholder" id="placeholder">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M2 16L8.586 9.414a2 2 0 012.828 0L16 14m0 0l2.586-2.586a2 2 0 012.828 0L22 12m-6 4h.01M4 22h16a2 2 0 002-2V4a2 2 0 00-2-2H4a2 2 0 00-2 2v16a2 2 0 002 2z"/>
            </svg>
            <p>Completa el prompt y haz clic en "Generar imagen"</p>
          </div>
          <img id="result-image" style="display:none" alt="Imagen generada">
          <div class="result-actions" id="result-actions" style="display:none">
            <button class="btn btn-secondary" id="download-btn">Descargar</button>
            <button class="btn btn-secondary" id="copy-prompt-btn">Copiar prompt</button>
          </div>
        </div>
        <div class="error-msg" id="error-msg"></div>
      </div>
    </div>
  </div>

  <footer>
    ComfyUI + Docker + SDXL
  </footer>

  <script>
    const form = document.getElementById('generate-form');
    const generateBtn = document.getElementById('generate-btn');
    const progressBar = document.getElementById('progress-bar');
    const resultImage = document.getElementById('result-image');
    const placeholder = document.getElementById('placeholder');
    const resultActions = document.getElementById('result-actions');
    const downloadBtn = document.getElementById('download-btn');
    const copyPromptBtn = document.getElementById('copy-prompt-btn');
    const errorMsg = document.getElementById('error-msg');
    const statusDot = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');
    const promptInput = document.getElementById('prompt');

    let currentImageUrl = null;
    let lastPrompt = '';

    async function checkHealth() {
      try {
        const r = await fetch('/api/health');
        const data = await r.json();
        if (data.status === 'ok') {
          statusDot.className = 'dot';
          statusText.textContent = 'ComfyUI conectado';
        } else {
          throw new Error(data.detail);
        }
      } catch {
        statusDot.className = 'dot error';
        statusText.textContent = 'ComfyUI no disponible';
      }
    }

    checkHealth();
    setInterval(checkHealth, 15000);

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.style.display = 'none';

      const prompt = promptInput.value.trim();
      if (!prompt) {
        showError('El prompt no puede estar vacío');
        return;
      }

      lastPrompt = prompt;
      generateBtn.classList.add('loading');
      generateBtn.disabled = true;
      progressBar.classList.add('active');
      resultImage.style.display = 'none';
      placeholder.style.display = 'block';
      placeholder.querySelector('p').textContent = 'Generando imagen...';
      resultActions.style.display = 'none';

      const formData = new FormData();
      formData.append('prompt', prompt);
      formData.append('negative_prompt', document.getElementById('negative-prompt').value);
      formData.append('model', document.getElementById('model').value);
      formData.append('seed', document.getElementById('seed').value);
      formData.append('steps', document.getElementById('steps').value);
      formData.append('cfg_scale', document.getElementById('cfg').value);
      formData.append('width', document.getElementById('width').value);
      formData.append('height', document.getElementById('height').value);

      try {
        const r = await fetch('/api/generate', {
          method: 'POST',
          body: formData,
        });

        if (!r.ok) {
          const err = await r.json();
          throw new Error(err.error || `Error ${r.status}`);
        }

        const blob = await r.blob();
        currentImageUrl = URL.createObjectURL(blob);

        placeholder.style.display = 'none';
        resultImage.src = currentImageUrl;
        resultImage.style.display = 'block';
        resultActions.style.display = 'flex';
      } catch (err) {
        showError(err.message);
        placeholder.querySelector('p').textContent = 'Completa el prompt y haz clic en "Generar imagen"';
      } finally {
        generateBtn.classList.remove('loading');
        generateBtn.disabled = false;
        progressBar.classList.remove('active');
      }
    });

    downloadBtn.addEventListener('click', () => {
      if (!currentImageUrl) return;
      const a = document.createElement('a');
      a.href = currentImageUrl;
      const timestamp = new Date().toISOString().replace(/[:.]/g, '-');
      a.download = `comfyui_${timestamp}.png`;
      a.click();
    });

    copyPromptBtn.addEventListener('click', () => {
      navigator.clipboard.writeText(lastPrompt).then(() => {
        copyPromptBtn.textContent = 'Copiado!';
        setTimeout(() => { copyPromptBtn.textContent = 'Copiar prompt'; }, 2000);
      });
    });

    document.getElementById('model').addEventListener('change', (e) => {
      const isFlux = e.target.value === 'flux';
      document.getElementById('cfg').value = isFlux ? '1' : '7';
      document.getElementById('steps').value = isFlux ? '28' : '30';
    });

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.style.display = 'block';
    }
  </script>
</body>
</html>
