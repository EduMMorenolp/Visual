services:
  comfyui:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${COMFYUI_PORT:-8188}:8188"
    volumes:
      - ./models/checkpoints:/app/models/checkpoints
      - ./models/loras:/app/models/loras
      - ./models/vae:/app/models/vae
      - ./models/upscale_models:/app/models/upscale_models
      - ./output:/app/output
      - ./input:/app/input
      - ./custom_nodes:/app/custom_nodes
    environment:
      - COMFYUI_ARGS=${COMFYUI_ARGS:---listen 0.0.0.0 --port 8188 --normalvram --force-fp16}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    stdin_open: true
    tty: true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8188/"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-8080}:8080"
    environment:
      - COMFYUI_URL=http://comfyui:8188
    depends_on:
      comfyui:
        condition: service_healthy
    restart: unless-stopped
